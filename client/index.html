<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Multi Timezone Clock</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Header -->

    <header class="header">
      <h1>🌍 Multi-Timezone Clock</h1>

      <div class="toggle-section">
        <span>12H</span>

        <label class="switch" for="format-toggle">
          <span id="format-toggle-label" class="sr-only"
            >Toggle time format (12-hour / 24-hour)</span
          >
          <input
            type="checkbox"
            id="format-toggle"
            title="Toggle time format (12-hour / 24-hour)"
            aria-labelledby="format-toggle-label"
            aria-checked="false"
          />

          <span class="slider"></span>
        </label>

        <span>24H</span>
      </div>
    </header>

    <!-- Search Area -->

    <section class="controls">
      <label for="timezone-select">Timezone:</label>
      <select id="timezone-select" title="Select a timezone to add a new clock">
        <option value="">Select Timezone</option>
      </select>

      <button id="add-clock">+ Add Clock</button>
    </section>

    <!-- Clock Cards -->

    <main id="clock-container"></main>

    <script src="../dist/client/app.js"></script>
  </body>
</html>
