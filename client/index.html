<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multi-Timezone Clock</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <h1>🌍 Multi-Timezone Clock</h1>

      <div class="toggle-box">
        <span>12H</span>

        <label class="switch">
          <input type="checkbox" id="format-toggle" title="Toggle time format" aria-label="Toggle between 12-hour and 24-hour format" />
          <span class="slider"></span>
        </label>

        <span>24H</span>
      </div>
    </header>

    <!-- Controls -->
    <section class="controls">
      <select id="timezone-select" aria-label="Select timezone">
        <option value="">Select Timezone</option>
      </select>

      <button id="add-clock">Add Clock</button>
    </section>

    <!-- Clock Cards -->
    <main id="clock-container"></main>

    <script type="module" src="/dist/client/app.js"></script>
  </body>
</html>
